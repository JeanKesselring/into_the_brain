<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Into the Brain — Jean</title>
  <style>
    :root {
      --nav-h: 64px;
      --fg: #e8dfd3;
      --bg: #07070e;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { overflow-x: hidden; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Georgia', 'Times New Roman', serif;
      overflow-x: hidden;
    }

    /* ── NAV ──────────────────────────────────────────────── */
    nav {
      position: fixed;
      inset: 0 0 auto 0;
      height: var(--nav-h);
      z-index: 500;
      background: rgba(7, 7, 14, 0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 52px;
    }

    .nav-l {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.72);
    }

    .nav-r {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
    }

    /* ── FIXED STAGE ──────────────────────────────────────── */
    #stage {
      position: fixed;
      top: var(--nav-h);
      left: 0; right: 0; bottom: 0;
      z-index: 0;
      background: var(--bg);
      overflow: hidden;
    }

    /* Edge vignette */
    #vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 85% 85% at 50% 50%,
        transparent 38%,
        rgba(7, 7, 14, 0.45) 72%,
        rgba(7, 7, 14, 0.88) 100%
      );
      z-index: 5;
      pointer-events: none;
    }

    /* ── IMAGE LAYERS ─────────────────────────────────────── */
    .img-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0;
      transform-origin: center center;
      will-change: opacity, transform;
    }

    .img-layer .main-img {
      position: absolute;
      width: 100%; height: 100%;
      object-fit: cover;
      user-select: none;
      -webkit-user-drag: none;
    }

    .img-layer .overlay-img {
      position: absolute;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      will-change: opacity;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* ── PROGRESS DOTS ────────────────────────────────────── */
    #progress {
      position: fixed;
      right: 22px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      pointer-events: none;
    }

    .pdot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.16);
      transition: background 0.4s ease, transform 0.4s ease;
    }

    .pdot.on {
      background: rgba(255, 255, 255, 0.75);
      transform: scale(1.5);
    }

    /* ── SCROLL HINT ──────────────────────────────────────── */
    #scroll-hint {
      position: fixed;
      bottom: 44px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      pointer-events: none;
      transition: opacity 0.7s ease;
    }

    #scroll-hint span {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
    }

    #scroll-arrow {
      width: 1px;
      height: 38px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.32), transparent);
      animation: arrowPulse 1.8s ease-in-out infinite;
    }

    @keyframes arrowPulse {
      0%, 100% { transform: scaleY(1);   opacity: 1; }
      50%       { transform: scaleY(0.55); opacity: 0.35; }
    }

    /* ── SCROLL DRIVER ────────────────────────────────────── */
    #scroller {
      position: relative;
      z-index: 10;
      pointer-events: none;
    }

    /* ── CHAPTER BLOCKS ───────────────────────────────────── */
    .ch-block {
      position: relative;
      display: flex;
      align-items: center;
      padding: 0 60px;
    }

    /* ── TEXT CARDS ───────────────────────────────────────── */
    .text-card {
      max-width: 360px;
      background: rgba(7, 7, 14, 0.80);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-left: 1px solid rgba(255, 255, 255, 0.10);
      padding: 28px 32px;
      opacity: 0;
      transform: translateX(-18px);
      transition: opacity 0.9s ease, transform 0.9s ease;
      pointer-events: auto;
    }

    .text-card.show {
      opacity: 1;
      transform: translateX(0);
    }

    .text-card h2 {
      font-size: 1.22rem;
      font-weight: 400;
      letter-spacing: 0.035em;
      color: rgba(255, 255, 255, 0.88);
      margin-bottom: 13px;
      line-height: 1.3;
    }

    .text-card p {
      font-size: 0.82rem;
      line-height: 1.88;
      color: rgba(232, 223, 211, 0.56);
    }
  </style>
</head>
<body>

<!-- ── NAVBAR ─────────────────────────────────────────────── -->
<nav>
  <span class="nav-l">Jean</span>
  <span class="nav-r">Into the Brain</span>
</nav>

<!-- ── FIXED IMAGE STAGE ──────────────────────────────────── -->
<div id="stage">
  <div id="vignette"></div>
  <!-- image layers injected by JS -->
</div>

<!-- ── PROGRESS DOTS ──────────────────────────────────────── -->
<div id="progress"></div>

<!-- ── SCROLL HINT ────────────────────────────────────────── -->
<div id="scroll-hint">
  <span>Scroll to explore</span>
  <div id="scroll-arrow"></div>
</div>

<!-- ── SCROLL DRIVER (creates page height + text panels) ──── -->
<div id="scroller"></div>

<script>
(() => {
  'use strict';

  /* ── CONFIG ─────────────────────────────────────────────── */
  const VH_PER_CHAPTER  = 3;    // scroll height per chapter (× viewport height)
  const FADE_START      = 0.55; // progress within chapter when cross-fade begins
  const OVERLAY_START   = 0.22; // progress when overlay image (4.5) starts fading in
  const OVERLAY_END     = 0.50; // progress when overlay image is fully opaque

  /* ── CHAPTER DATA ───────────────────────────────────────── */
  // zoomFactor: how many times more zoomed-in the NEXT image is relative to this one.
  // 1→2: 2×,  2→3 onward: 4×,  4→4.5: 1:1 (overlay, same chapter),  last chapter: unused.
  const chapters = [
    {
      src: 'Images/1.jpg', overlay: null, zoomFactor: 2,
      heading: 'Into the Brain',
      body: "The brain is a 1.4-kilogram organ that somehow accounts for everything you are. Seen from the side, you can make out the four lobes of the cerebral cortex, the brainstem tucked beneath, and the cauliflower-like cerebellum at the back. It burns through 20% of your body's energy despite being only 2% of your weight. The most immediately striking thing about it is the surface: instead of being smooth, it's folded into ridges and valleys. That folding is the brain's solution to fitting a very large cortex into a skull that still has to fit through a birth canal."
    },
    {
      src: 'Images/2.jpg', overlay: null, zoomFactor: 4,
      heading: 'Gyri and Sulci: The Folded Landscape',
      body: "The ridges of the cortex are called gyri and the grooves between them are sulci. From person to person the pattern varies, like fingerprints, but certain landmarks are consistent enough to have names. The central sulcus divides motor cortex from sensory cortex. The lateral sulcus separates the temporal lobe from the rest. The brain is nearly smooth at birth and develops its characteristic wrinkled shape mostly during the third trimester. The folding isn't random either. Regions that communicate heavily with each other tend to end up folded close together, which keeps the connecting fibers short and the signaling fast."
    },
    {
      src: 'Images/3.jpg', overlay: null, zoomFactor: 4,
      heading: 'The Cortical Surface',
      body: "Up close, the surface of a gyrus loses any sense of smoothness. You're looking at the outermost layer of the cortex, covered by a thin membrane called the pia mater, beneath which lies the gray matter. Gray matter is 2 to 4 millimeters thick and packed with neuronal cell bodies, dendrites, and short axons. The very surface you're seeing here is Layer I, which contains almost no cell bodies at all, just a dense horizontal weave of fibers and the tips of dendrites reaching up from neurons deeper down. It's where long-range signals from distant cortical regions arrive and quietly modulate everything below."
    },
    {
      // Image 4 + 4.5 are 1:1 scale (same field of view), so 4.5 is an overlay.
      // The zoom to image 5 is 4× from image 4's perspective.
      src: 'Images/4.jpg', overlay: 'Images/4.5.jpg', zoomFactor: 4,
      heading: 'The Gyrus in Cross-Section',
      body: "Cut through a gyrus and you immediately see two distinct zones. The outer band, textured and granular, is the gray matter. The smooth inner core is white matter. The gray matter holds the neurons; the white matter is the cabling that connects them, made almost entirely of myelinated axons bundled into fiber tracts. The cortical ribbon twists as it folds into the sulcal walls, and it's slightly thinner at the crown of a gyrus than along its sides, a consequence of the mechanical forces involved in folding. Hidden within the gray matter, though not visible at this scale, are the six distinct cellular layers of the neocortex."
    },
    {
      src: 'Images/5.jpg', overlay: null, zoomFactor: 4,
      heading: "White Matter: The Brain's Wiring",
      body: "White matter makes up about 60% of the brain's total volume, which tells you something about how much of the brain's job is simply moving signals from one place to another. The smooth, rounded forms here are fiber bundles in cross-section, each one a tightly packed cable of myelinated axons. Myelin is a fatty sheath wrapped around axons by cells called oligodendrocytes, and it increases conduction speed dramatically, from about 1 meter per second in unmyelinated fibers to over 100. Named tracts connect specific regions: language areas in the frontal and temporal lobes, the two hemispheres via the corpus callosum, and motor cortex all the way down to the spinal cord."
    },
    {
      src: 'Images/6.jpg', overlay: null, zoomFactor: 4,
      heading: 'Cortical Lamination: Six Layers',
      body: "A thin slice of cortex under sufficient magnification reveals alternating bands of varying cell density. These are the six layers of the neocortex, each with its own cellular population and its own pattern of connections. Layer IV receives incoming signals from the thalamus and is thick in sensory areas, almost absent in motor cortex. Layer V contains the largest neurons in the cortex, including giant cells whose axons travel down to the spinal cord. Layer VI sends feedback signals back to the thalamus. This six-layer circuit, repeated across the entire cortical surface with regional variations, is the basic computational unit of the neocortex."
    },
    {
      src: 'Images/7.jpg', overlay: null, zoomFactor: 4,
      heading: 'The Neuropil: A Forest of Connections',
      body: "Between the cell bodies, the cortex is filled with a dense tangle of processes called the neuropil. What looks like textured gray matter at a coarser scale is, at cellular resolution, an almost incomprehensibly dense thicket of dendrites, axons, and synaptic terminals. A single cubic millimeter of human cortex contains around 100,000 neurons, one billion synaptic connections, and kilometers of cellular cable. Scattered through this tangle are glial cells: astrocytes that regulate the chemical environment around synapses, microglia that survey for damage and prune unused connections, and oligodendrocytes laying down myelin. The apparent uniformity of the neuropil hides a specificity of wiring that took a lifetime to build."
    },
    {
      src: 'Images/8.jpg', overlay: null, zoomFactor: 4,
      heading: 'The Neuron',
      body: "A single pyramidal neuron, the most common excitatory cell type in the cortex. The triangular cell body sits at the center, with a thick apical dendrite rising toward the surface and basal dendrites spreading outward in all directions. From the base of the soma, an axon descends toward distant targets. The soma itself is 10 to 25 micrometers across, roughly a quarter the width of a human hair, and contains the nucleus along with all the machinery needed to sustain a cell that may live for a century. This one cell may receive 20,000 synaptic inputs. It integrates them all and, when the sum crosses a threshold, fires a pulse."
    },
    {
      src: 'Images/9.jpg', overlay: null, zoomFactor: 4,
      heading: 'The Dendrite: Branching into Computation',
      body: "Dendrites are where a neuron listens. They branch outward from the cell body like a tree, collecting synaptic inputs across a wide territory. Their geometry matters: a dendrite that branches broadly can receive input from many different sources. Dendrites are not passive wires; they contain voltage-gated ion channels that actively shape the signals traveling through them, amplifying some and filtering others. An input arriving far from the cell body on a thin terminal branch is processed very differently from one arriving on a thick proximal trunk. All along the length of these branches, at intervals that increase toward the tips, tiny protrusions emerge from the surface. Those are dendritic spines."
    },
    {
      src: 'Images/10.jpg', overlay: null, zoomFactor: 4,
      heading: 'Dendritic Spines: Thorns of Memory',
      body: "Every small bump along this dendrite is a dendritic spine, and each one marks the site of a single excitatory synapse. Spines come in different shapes: thin, mushroom-shaped, or stubby, and the shape reflects the maturity and strength of the synapse. Mushroom spines with large heads are thought to represent stable, long-term connections. Thin spines are more plastic and transient. When a synapse is repeatedly activated, its spine head grows larger and acquires more receptors. When activity drops away, spines can shrink and disappear. Spine density is a kind of structural record of a neuron's synaptic history, and it changes throughout life in response to learning and experience."
    },
    {
      src: 'Images/11.jpg', overlay: null, zoomFactor: 4,
      heading: 'The Spine Head: A Biochemical Compartment',
      body: 'A single spine head. The narrow neck connecting it to the dendrite is not just an anatomical feature but a functional barrier: it restricts the diffusion of molecules between the spine and the parent branch. This means each spine can function as its own biochemical compartment. Calcium flooding in during synaptic activity stays mostly within the spine, where it triggers local signaling without disturbing neighboring spines. Inside this tiny volume, an actin cytoskeleton constantly reorganizes in response to synaptic signals, changing the shape and size of the head. The small irregular dots beginning to appear on its surface are individual receptor protein complexes, each one embedded in the membrane at the synapse.'
    },
    {
      src: 'Images/12.jpg', overlay: null, zoomFactor: 2,
      heading: 'The Postsynaptic Density',
      body: "Those small tower-like structures clustered on the spine surface are the proteins of the postsynaptic density. The postsynaptic density is a highly organized molecular assembly located at the tip of the spine, precisely aligned with the point on the presynaptic terminal where neurotransmitter is released. It was first described in electron microscopy as a dark thickening on the membrane and has since turned out to contain over 300 distinct proteins. A scaffold protein called PSD-95 organizes everything, clustering glutamate receptors and anchoring signaling enzymes in position. The larger the postsynaptic density, the more receptors it holds and the stronger the synapse. Size increases during the cellular process underlying memory formation"
    },
    {
      src: 'Images/13.jpg', overlay: null, zoomFactor: 1, // last chapter, no next image
      heading: 'Glutamate Receptors: Molecules of Transmission',
      body: "At the finest scale in this series, the individual protein molecules themselves come into view. Each irregular protrusion on this spine surface is a glutamate receptor, an ion channel that opens when neurotransmitter binds and lets charged ions flow across the membrane, depolarizing the cell. AMPA receptors mediate fast transmission; NMDA receptors are more selective, requiring both a neurotransmitter signal and membrane depolarization to open, which makes them sensitive to the coincidence of pre- and postsynaptic activity. That coincidence-detection property is thought to be the molecular basis of Hebbian learning: neurons that fire together, wire together. At this scale, one molecule wide, thought meets chemistry."
    }
  ];

  /* ── ELEMENT REFS ───────────────────────────────────────── */
  const stage      = document.getElementById('stage');
  const scroller   = document.getElementById('scroller');
  const progressEl = document.getElementById('progress');
  const scrollHint = document.getElementById('scroll-hint');

  /* ── BUILD DOM ──────────────────────────────────────────── */

  // Image layers — cache ovImg ref so we never querySelector in the render loop
  const layerData = chapters.map((ch, i) => {
    const div = document.createElement('div');
    div.className = 'img-layer';

    const img = document.createElement('img');
    img.className = 'main-img';
    img.src = ch.src;
    img.alt = ch.heading || '';
    img.decoding = 'async';
    if (i > 1) img.loading = 'lazy'; // first two load eagerly
    div.appendChild(img);

    let ovImg = null;
    if (ch.overlay) {
      ovImg = document.createElement('img');
      ovImg.className = 'overlay-img';
      ovImg.src = ch.overlay;
      ovImg.alt = '';
      ovImg.decoding = 'async';
      div.appendChild(ovImg);
    }

    stage.appendChild(div);
    return { layer: div, ovImg };
  });

  // Progress dots
  const dotEls = chapters.map((_) => {
    const d = document.createElement('div');
    d.className = 'pdot';
    progressEl.appendChild(d);
    return d;
  });

  // Text cards (in scroll flow)
  const cardEls = chapters.map((ch) => {
    const block = document.createElement('div');
    block.className = 'ch-block';

    const card = document.createElement('div');
    card.className = 'text-card';

    if (ch.heading) {
      const h2 = document.createElement('h2');
      h2.textContent = ch.heading;
      card.appendChild(h2);
    }
    if (ch.body) {
      const p = document.createElement('p');
      p.textContent = ch.body;
      card.appendChild(p);
    }

    block.appendChild(card);
    scroller.appendChild(block);
    return card;
  });

  /* ── SIZING — cached so render() never touches window.innerHeight ── */
  let chH = window.innerHeight * VH_PER_CHAPTER;

  const blockEls = document.querySelectorAll('.ch-block');

  function applyHeights() {
    chH = window.innerHeight * VH_PER_CHAPTER;
    blockEls.forEach(b => { b.style.height = `${chH}px`; });
    scroller.style.height = `${chH * chapters.length + window.innerHeight * 0.5}px`;
  }
  applyHeights();

  /* ── MATH HELPERS ───────────────────────────────────────── */
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function ease(t) { t = clamp(t, 0, 1); return t < 0.5 ? 2*t*t : -1 + (4-2*t)*t; }
  function linearStep(t, a, b) { return clamp((t - a) / (b - a), 0, 1); }

  /* ── RENDER STATE ───────────────────────────────────────── */
  // Track which layer indices are currently visible so we only write to the
  // 2 active layers per frame and can clean up exactly when chapter changes.
  let visibleSet = new Set();
  let prevCur    = -1;

  /* ── MAIN RENDER ────────────────────────────────────────── */
  function render() {
    const sy = window.scrollY;

    const rawIdx = sy / chH;
    const cur    = clamp(Math.floor(rawIdx), 0, chapters.length - 1);
    const prog   = rawIdx - Math.floor(rawIdx);

    const isLast   = cur === chapters.length - 1;
    const fadeRaw  = isLast ? 0 : linearStep(prog, FADE_START, 1.0);
    const fadeT    = ease(fadeRaw);
    const Z        = chapters[cur].zoomFactor;
    const curScale = 1 + prog * (Z - 1);

    /* ── Image layers: only touch cur and cur+1 ── */
    const newVisible = new Set([cur]);
    if (!isLast) newVisible.add(cur + 1);

    // Hide any layer that was visible last frame but isn't anymore
    for (const idx of visibleSet) {
      if (!newVisible.has(idx)) {
        layerData[idx].layer.style.opacity   = 0;
        layerData[idx].layer.style.transform = 'translate3d(0,0,0) scale(1)';
      }
    }
    visibleSet = newVisible;

    // Current layer: zooms from 1.0 → Z, stays fully opaque (acts as background
    // so there's never a dark gap around the incoming smaller image)
    const cur_d = layerData[cur];
    cur_d.layer.style.opacity   = 1;
    cur_d.layer.style.transform = `translate3d(0,0,0) scale(${curScale.toFixed(4)})`;

    if (cur_d.ovImg) {
      cur_d.ovImg.style.opacity = ease(linearStep(prog, OVERLAY_START, OVERLAY_END));
    }

    // Next layer: fades in at scale curScale/Z so its field of view matches exactly
    if (!isLast) {
      const next_d    = layerData[cur + 1];
      const nextScale = curScale / Z;
      next_d.layer.style.opacity   = fadeT;
      next_d.layer.style.transform = `translate3d(0,0,0) scale(${nextScale.toFixed(4)})`;
    }

    /* ── Progress dots: classList only on chapter change ── */
    if (cur !== prevCur) {
      if (prevCur >= 0) dotEls[prevCur].classList.remove('on');
      dotEls[cur].classList.add('on');
      prevCur = cur;
    }

    /* ── Text cards ── */
    cardEls.forEach((card, i) => {
      card.classList.toggle('show', i === cur && prog < FADE_START + 0.05);
    });

    /* ── Scroll hint ── */
    scrollHint.style.opacity = sy > chH * 0.35 ? '0' : '1';
  }

  /* ── EVENT LISTENERS ────────────────────────────────────── */
  let rafPending = false;
  window.addEventListener('scroll', () => {
    if (!rafPending) {
      rafPending = true;
      requestAnimationFrame(() => { render(); rafPending = false; });
    }
  }, { passive: true });

  window.addEventListener('resize', () => {
    applyHeights();
    render();
  });

  // First render
  render();

})();
</script>
</body>
</html>
